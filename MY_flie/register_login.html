<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>登陆注册</title>

<style>
	/*  背景  */
    body {
        margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    }

    /* 卡片 */
.container {
    width: 300px;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 30px 30px 20px rgba(0,0,0,0.3);
    text-align: center;
}

    /* 标题 */
h2 {
    margin-bottom: 20px;
}

    /* 输入框 */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

/* 输入框聚焦效果 */
input:focus {
    border-color: #667eea;
}

 /* 按钮 */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

/* 按钮点击效果 */
button:hover {
    background: #5a67d8;
}

/* 切换文字 */
.switch {
    margin-top: 15px;
    color: #667eea;
    cursor: pointer;
    font-size: 14px;
}

</style>
</heaad>



<body>

<div class="container">

<!-- 登录 -->
<div id="loginBox">
    <h2>登录</h2>
    <input id="loginUser" placeholder="用户名">
    <input id="loginPass" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
    <p onclick="showRegister()">没有账号？去注册</p>
</div>

<!-- 注册 -->
<div id="registerBox" style="display:none;">
    <h2>注册</h2>
    <input id="regUser" placeholder="用户名">
    <input id="regPass" type="password" placeholder="密码">
    <button onclick="register()">注册</button>
    <p onclick="showLogin()">已有账号？去登录</p>
</div>

</div>

<script>
function showRegister() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("registerBox").style.display = "block";
}

function showLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("registerBox").style.display = "none";
}
</script>

<script>
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    if (user.trim() == "" || pass.trim() == "") {
        alert("请输入用户名和密码");
        return;
    }

    let storedPass = localStorage.getItem(user);

    if (storedPass == null) {
        alert("用户不存在！");
    } else if (storedPass === pass) {
        //alert("登录成功！");
	localStorage.setItem("currentUser", user);
	window.location.href = "welcome.html";
    } else {
        alert("密码错误！");
    }
}
</script>

<script>
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if (user.trim() == "" || pass.trim() == "") {
        alert("用户名或密码不能为空");
        return;
    }

    // 检查是否存在
    let existing = localStorage.getItem(user);

    if (existing != null) {
        alert("用户已存在！");
        return;
    }

    // 存储
    localStorage.setItem(user, pass);

    alert("注册成功！");
    showLogin();
}
</script>

</body>
</html>
